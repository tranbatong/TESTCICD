server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: acnecare-api
  datasource:
    url: jdbc:mysql://localhost:3306/acnecare
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  # Đưa redis vào đúng vị trí dưới spring
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  signer_key: "fb886b389ba6cd149a7deef483af664b62ff17776eb0d04a991251c0e4fba92e"
  access-token-valid-duration: 3600
  refresh-token-valid-duration: 604800

cors:
  allowed-origins: "http://localhost:5173"

storage:
  upload-dir: ./uploads
  base-url: http://localhost:8080/api/files
  max-file-size: 10485760
  allowed-types: image/jpeg,image/png,image/webp,image/gif,application/pdf
  max-user-size: 209715200
  max-facescan-user-size: 524288000
