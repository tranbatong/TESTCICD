name: Deploy AcneCare API to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.ACCESS_TOKEN_DOCKER }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: batong25/acnecare-api:latest

      - name: Triển khai lên DevOps Classroom
        run: |
          # Cấu hình thông tin repo và port
          REPO="batong25/acnecare-api"
          CONTAINER_PORT=80
          
          echo "Đang gửi yêu cầu deploy tới server..."
          
          # Sử dụng curl với --max-time để tránh treo job quá lâu nếu server không phản hồi
          # Biến RESPONSE sẽ chứa cả Body và Http Code ở dòng cuối cùng
          RESPONSE=$(curl -sS --max-time 180 -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=2&container_port=$CONTAINER_PORT&strict_container_port=0")
          
          # Tách lấy phần nội dung (Body) và mã lỗi (Code)
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          
          echo "Webhook HTTP Status Code: $CODE"
          
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "------------------------------------------"
            echo "DEPLOY THẤT BẠI!"
            echo "Lỗi HTTP: $CODE"
            if [ "$CODE" -eq 524 ]; then
              echo "Ghi chú: Lỗi 524 nghĩa là server phản hồi quá lâu (Timeout)."
            fi
            echo "------------------------------------------"
            
            echo "::group::Chi tiết phản hồi từ Server (JSON)"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi
          
          echo "------------------------------------------"
          echo "DEPLOY THÀNH CÔNG!"
          echo "------------------------------------------"
          echo "::group::Chi tiết phản hồi từ Server (JSON)"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
